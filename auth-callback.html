<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Finishing sign-in</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fbf4e8;
      --card: rgba(255, 255, 255, 0.9);
      --text: #2b241f;
      --muted: #7b6b5c;
      --accent: #ef7f1a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Inter", system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 199, 128, 0.35), transparent 38%),
        linear-gradient(180deg, #fff9f2 0%, var(--bg) 100%);
      color: var(--text);
    }
    .card {
      width: min(440px, 100%);
      padding: 28px 24px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid rgba(194, 160, 121, 0.25);
      box-shadow: 0 24px 60px rgba(116, 76, 28, 0.12);
      text-align: center;
    }
    .dot {
      width: 18px;
      height: 18px;
      margin: 0 auto 18px;
      border-radius: 999px;
      border: 3px solid rgba(239, 127, 26, 0.2);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.1;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }
    .error {
      margin-top: 14px;
      color: #b23a48;
      font-weight: 600;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="dot" aria-hidden="true"></div>
    <h1>Finishing sign-in</h1>
    <p id="statusText">We are connecting your Google account and loading your family access.</p>
    <p id="errorText" class="error" hidden></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js?v=20260721-authloop1"></script>
  <script>
    (async function finishFamilyBitesGoogleLogin() {
      const statusText = document.getElementById('statusText');
      const errorText = document.getElementById('errorText');
      const hasAuthParams = window.location.search.includes('code=')
        || window.location.hash.includes('access_token=')
        || window.location.hash.includes('refresh_token=');

      function showError(message) {
        statusText.textContent = 'Google sign-in could not finish automatically.';
        errorText.hidden = false;
        errorText.textContent = message;
      }

      try {
        if (!window.familyBitesDb?.client?.auth?.getSession) {
          showError('Supabase auth client is not available on the callback page.');
          return;
        }

        for (let attempt = 0; attempt < 20; attempt += 1) {
          const session = await window.familyBitesDb.getSession();
          if (session?.user) {
            await window.familyBitesDb.ensureUserContext?.();
            statusText.textContent = 'Sign-in complete. Opening your dashboard…';
            window.location.replace('/#/');
            return;
          }
          await new Promise((resolve) => window.setTimeout(resolve, 500));
        }

        showError(
          hasAuthParams
            ? 'Google returned to the app, but the session did not finish saving on this device.'
            : 'No active session was created from the Google callback.'
        );
      } catch (error) {
        console.error('Auth callback failed.', error);
        showError(error?.message || 'Unknown sign-in error.');
      }
    })();
  </script>
</body>
</html>
